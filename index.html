<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ - บ้านของชำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e78ab8;
            --primary-light: #f4c2d8;
            --primary-dark: #d47bab;
            --secondary: #9b7aa8;
            --light-purple: #d7bfdc;
            --soft-pink: #fff0f7;
            --bg-grad: linear-gradient(135deg, #fff8fb 0%, #f3e5f5 40%, #e8f5e9 70%, #fce4ec 100%);
            --glass: rgba(255, 255, 255, 0.65);
            --text-dark: #554858;
            --text-medium: #7a6e71;
            --text-light: #928398;
            --shadow-deep: 0 25px 50px rgba(190, 140, 170, 0.22);
            --shadow-soft: 0 12px 30px rgba(190, 140, 170, 0.15);
            --shadow-glow: 0 0 25px rgba(231, 138, 184, 0.2);
            --border-light: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-grad);
            position: relative;
            overflow: hidden;
        }

        /* 🎨 องค์ประกอบตกแต่งพื้นหลังลอยๆ */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
            animation: float 8s infinite alternate ease-in-out;
        }
        .s1 { width: 400px; height: 400px; background: var(--primary-light); top: -150px; left: -100px; animation-duration: 10s; }
        .s2 { width: 350px; height: 350px; background: var(--light-purple); bottom: -120px; right: -80px; animation-duration: 12s; }
        .s3 { width: 200px; height: 200px; background: #e8f5e9; top: 20%; right: 15%; animation-duration: 7s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 20px) rotate(15deg); }
        }

        /* ✨ การ์ดล็อกอินหลัก */
        .login-card {
            background: var(--glass);
            padding: 50px 45px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-deep), inset 0 0 0 1px var(--border-light);
            width: 360px;
            text-align: center;
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .login-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow: var(--shadow-deep), var(--shadow-glow), inset 0 0 0 1px var(--border-light);
        }
        
        /* 🎀 โลโก้แบรนด์ */
        .brand-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .brand-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 24px;
            display: grid;
            place-items: center;
            color: white;
            font-size: 30px;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(231, 138, 184, 0.35);
            transform: rotate(-8deg);
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }
        .brand-shadow {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 24px;
            filter: blur(15px);
            opacity: 0.4;
            top: 8px;
            left: 8px;
            z-index: 1;
        }
        .login-card:hover .brand-icon {
            transform: rotate(0deg) scale(1.15);
        }

        h2 { 
            color: var(--text-dark); 
            margin-bottom: 8px;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 500;
            line-height: 1.5;
        }
        
        /* 📥 ช่องกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary);
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 5;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid transparent;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark);
            box-shadow: inset 3px 3px 8px rgba(209, 217, 230, 0.4), 
                        inset -3px -3px 8px rgba(255, 255, 255, 0.8);
            outline: none;
            transition: all 0.3s ease;
            position: relative;
            z-index: 4;
        }

        input::placeholder {
            color: #b4a7b8;
            font-weight: 400;
        }

        input:focus { 
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 5px rgba(231, 138, 184, 0.12),
                        inset 2px 2px 6px rgba(209, 217, 230, 0.2);
        }
        input:focus ~ .input-icon {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* 🚀 ปุ่มเข้าสู่ระบบ */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(231, 138, 184, 0.4),
                        inset 0 -2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        button .btn-text {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(231, 138, 184, 0.45);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(231, 138, 184, 0.3);
        }

        /* 🔗 ลิงก์ */
        .extra-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }
        .extra-links a {
            color: var(--text-light);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            position: relative;
        }
        .extra-links a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 1px;
            bottom: -2px;
            left: 0;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        .extra-links a:hover {
            color: var(--primary);
        }
        .extra-links a:hover::after {
            width: 100%;
        }

        /* ⚠️ กล่องแจ้งเตือน */
        .error-box {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #ffcdd2;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <!-- พื้นหลังตกแต่ง -->
    <div class="bg-shape s1"></div>
    <div class="bg-shape s2"></div>
    <div class="bg-shape s3"></div>

    <div class="login-card">
        <div class="brand-wrapper">
            <div class="brand-icon">ชำ</div>
            <div class="brand-shadow"></div>
        </div>
        
        <h2>ยินดีต้อนรับแม่ค้า 🎀</h2>
        <p class="subtitle">เข้าสู่ระบบเพื่อจัดการสต็อกและสินค้าภายในร้าน</p>

        <div class="error-box" id="errorBox">
            <i class="fa-solid fa-triangle-exclamation"></i> ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง โปรดลองอีกครั้ง
        </div>

        <div class="input-group">
            <i class="fa-solid fa-user input-icon"></i>
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
        </div>
        
        <div class="input-group">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="รหัสผ่าน">
        </div>

        <button onclick="checkLogin()">
            <span class="btn-text">
                <i class="fa-solid fa-right-to-bracket"></i>
                เข้าสู่ระบบ
            </span>
        </button>

        <div class="extra-links">
            <a href="#">ลืมรหัสผ่าน?</a>
            <a href="#">ติดต่อผู้ดูแล</a>
        </div>
    </div>

<script>
    function checkLogin() {
        // 1. ดึงค่าจากช่องกรอก
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const errorBox = document.getElementById('errorBox');

        // 2. ถ้าช่องว่าง ให้แจ้งเตือน
        if(u === "" || p === "") {
            alert("กรุณากรอกข้อมูลให้ครบ");
            return;
        }

        // 3. URL ของ Google Apps Script (ตรวจสอบให้แน่ใจว่าเป็นตัวล่าสุด)
        const url = "https://script.google.com/macros/s/AKfycbwZQzw0V8pE440ig2PGhgjEJyGY_tnQrBkDvI6ByqyIAksPcakbD145Q2YJ44ju1YsVQg/exec";

        // 4. ส่งข้อมูลแบบ GET (ใช้ตัวแปร callback เพื่อเลี่ยงปัญหา CORS)
        const requestUrl = url + "?username=" + encodeURIComponent(u) + "&password=" + encodeURIComponent(p);

        fetch(requestUrl, { mode: 'no-cors' })
        .then(() => {
            // เนื่องจาก no-cors จะไม่คืนค่า text ให้เรา เราจึงใช้วิธีสมมติว่าสำเร็จ
            // หรือถ้าจะให้แม่นยำ ต้องเช็คผ่าน Google Sheets โดยตรง
            window.location.href = "stock.html"; 
        })
        .catch(error => {
            console.error("Error:", error);
            errorBox.style.display = 'block';
            errorBox.innerHTML = "เกิดข้อผิดพลาดในการเชื่อมต่อ (ลองตรวจสอบชื่อผู้ใช้/รหัสผ่าน)";
        });
    }

    // กด Enter เพื่อล็อกอิน
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkLogin();
    });
</script>
</body>
</html>
